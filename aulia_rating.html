<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review & Rating Coffee Shop</title>
    <style>
        /* Import font biar lebih rapi */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Background pastel beige ala kopi susu */
            background-color: #FDFBF7; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #5C4D43;
        }

        .review-container {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(189, 173, 161, 0.2);
            text-align: center;
        }

        .review-container h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #4A3B32;
        }

        .review-container p {
            font-size: 14px;
            color: #8C7A6B;
            margin-bottom: 25px;
        }

        /* Styling Bintang */
        .rating-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-direction: row-reverse; /* Trik untuk hover dari kiri ke kanan */
        }

        .rating-box input {
            display: none;
        }

        .rating-box label {
            font-size: 40px;
            color: #E6E0D8; /* Warna bintang kosong */
            cursor: pointer;
            transition: color 0.2s ease-in-out;
        }

        /* Efek saat bintang di-hover atau dipilih (Kuning Pastel) */
        .rating-box label:hover,
        .rating-box label:hover ~ label,
        .rating-box input:checked ~ label {
            color: #FFD166; 
        }

        /* Styling Text Area */
        textarea {
            width: 100%;
            height: 120px;
            background-color: #F9F6F0; /* Soft pastel background */
            border: 2px solid #EAE0D5;
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #5C4D43;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #D6CCC2;
        }

        textarea::placeholder {
            color: #BDB2A6;
        }

        /* Styling Button (Soft Cokelat Pastel) */
        .submit-btn {
            width: 100%;
            background-color: #D4A373; 
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .submit-btn:hover {
            background-color: #C08D5D;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

    <div class="review-container">
        <h2>Gimana kopinya? ☕</h2>
        <p>Bantu kami jadi lebih baik dengan ulasan kamu!</p>

        <form id="reviewForm">
            <div class="rating-box">
                <input type="radio" name="rating" id="star5" value="5">
                <label for="star5">&#9733;</label>
                
                <input type="radio" name="rating" id="star4" value="4">
                <label for="star4">&#9733;</label>
                
                <input type="radio" name="rating" id="star3" value="3">
                <label for="star3">&#9733;</label>
                
                <input type="radio" name="rating" id="star2" value="2">
                <label for="star2">&#9733;</label>
                
                <input type="radio" name="rating" id="star1" value="1">
                <label for="star1">&#9733;</label>
            </div>

            <textarea id="reviewText" placeholder="Ceritain pengalaman kamu di sini, der..." required></textarea>

            <button type="submit" class="submit-btn">Kirim Ulasan</button>
        </form>
    </div>

    <script>
        // JavaScript sederhana buat nangkep data pas tombol diklik
        document.getElementById('reviewForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah page reload

            // Ambil nilai rating
            const ratingInput = document.querySelector('input[name="rating"]:checked');
            const reviewText = document.getElementById('reviewText').value;

            if (!ratingInput) {
                alert('Pilih bintangnya dulu ya!');
                return;
            }

            const ratingValue = ratingInput.value;

            // Di sini lu bisa sambungin ke Backend (misal pake fetch API ke Node.js / MongoDB)
            console.log("Rating:", ratingValue, "Bintang");
            console.log("Ulasan:", reviewText);

            alert('Mantap, ulasan berhasil dikirim! Makasih ya.');
            
            // Reset form setelah submit
            this.reset();
        });
    </script>

</body>
</html>
